<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myanmar Hotel Bot</title>
    <style>
      :root {
        --bg: #f5efe6;
        --card: #fffaf5;
        --ink: #1e293b;
        --muted: #6b7280;
        --brand: #0f766e;
        --brand-dark: #115e59;
        --line: #e5dccf;
        --user: #d9f3ef;
        --bot: #fef3c7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top right, #ffe8c2, transparent 20%),
          linear-gradient(180deg, #f7f2ea 0%, #efe3d2 100%);
        color: var(--ink);
      }

      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
      }

      .hero {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .panel-header {
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        font-weight: bold;
      }

      .chat-box {
        height: 480px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .message {
        max-width: 85%;
        padding: 12px 14px;
        border-radius: 16px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        background: var(--user);
      }

      .message.assistant {
        align-self: flex-start;
        background: var(--bot);
      }

      .composer {
        display: flex;
        gap: 12px;
        padding: 16px;
        border-top: 1px solid var(--line);
      }

      textarea,
      button {
        font: inherit;
      }

      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #d6c9b8;
        border-radius: 14px;
        background: #fffdfa;
        min-height: 72px;
        resize: vertical;
      }

      button {
        border: none;
        border-radius: 14px;
        padding: 12px 16px;
        background: var(--brand);
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-dark);
      }

      @media (max-width: 800px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <h1>Golden Lotus Hotel Bot</h1>
        <p class="subtitle">
          Myanmar-language hotel assistant for FAQ, rates, venue rental, and booking guidance.
        </p>
      </section>

      <section class="layout">
        <div class="panel">
          <div class="panel-header">Chat Test</div>
          <div id="chatBox" class="chat-box"></div>
          <div class="composer">
            <textarea id="messageInput" placeholder="ဥပမာ - မင်္ဂလာပါ။ Deluxe Room ဈေးနှုန်းနဲ့ breakfast ပါမပါ သိချင်ပါတယ်။"></textarea>
            <button id="sendBtn">Send</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const chatBox = document.getElementById("chatBox");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");
      const history = [];

      function appendMessage(role, content) {
        const div = document.createElement("div");
        div.className = `message ${role}`;
        div.textContent = content;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        appendMessage("user", message);
        history.push({ role: "user", content: message });
        messageInput.value = "";
        sendBtn.disabled = true;

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, history })
          });

          const data = await response.json();
          const reply = data.reply || data.error || "Unexpected error";
          appendMessage("assistant", reply);
          history.push({ role: "assistant", content: reply });
        } catch (error) {
          appendMessage("assistant", "တောင်းပန်ပါတယ်။ Server error ဖြစ်နေပါတယ်။");
        } finally {
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener("click", sendMessage);

      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      appendMessage(
        "assistant",
        "မင်္ဂလာပါ။ Golden Lotus Hotel ကို ဆက်သွယ်ပေးတဲ့အတွက် ကျေးဇူးတင်ပါတယ်။ အခန်းအမျိုးအစား၊ ဈေးနှုန်း၊ venue rental နဲ့ booking link / contact information ကို မေးမြန်းနိုင်ပါတယ်။"
      );
    </script>
  </body>
</html>
